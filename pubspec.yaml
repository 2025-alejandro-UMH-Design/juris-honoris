name: juris_honoris
description: Asistente legal con IA para Honduras — Juris Honoris
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.1
  equatable: ^2.0.5

  # Networking (AI providers)
  dio: ^5.4.0

  # Routing
  go_router: ^13.2.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Dependency Injection
  get_it: ^7.6.7

  # Date & Time
  intl: ^0.20.2

  # Validation
  email_validator: ^2.1.17

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0

  # Logging
  logger: ^2.1.0

  # UUID
  uuid: ^4.3.3
  device_preview: ^1.3.1

  # URL Launcher (Google Maps, links externos)
  url_launcher: ^6.3.1

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Firebase (push notifications)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Document Storage (cámara, galería)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
